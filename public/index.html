<!DOCTYPE html>
<html>
<head>
    <title>✨ Pretty On Budget 💖</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>
<body>

<h1>✨ Pretty On Budget 💖</h1>

<div class="container">

    <label>Name</label>
    <input type="text" id="name">

    <label>Skin Type</label>
    <select id="skin">
        <option>Oily</option>
        <option>Dry</option>
        <option>Combination</option>
        <option>Sensitive</option>
    </select>

    <label>Budget (₹)</label>
    <input type="number" id="budget">

    <label>Skin Issue</label>
    <input type="text" id="issue">

    <button onclick="getPlan()">Show My Plan ✨</button>
    <p id="quote"></p> 
    <div id="result"></div>
    <div class="stickers">
  <span>🌸</span>
  <span>💖</span>
  <span>✨</span>
  <span>🧴</span>
  <span>💅</span>
  <span>🌷</span>
  <span>🦋</span>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
