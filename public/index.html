<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Pretty On Budget</title>

  <link rel="stylesheet" href="style.css"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- glow sparkles -->
  <div class="sparkle sparkle1"></div>
  <div class="sparkle sparkle2"></div>
  <div class="sparkle sparkle3"></div>
  <div class="sparkle sparkle4"></div>

  <div class="container">

    <h1 class="title">Pretty On Budget ✨</h1>

    <p class="subtitle">
      your personal skincare planner 💜
    </p>

    <!-- NAME -->
    <input
      type="text"
      id="name"
      placeholder="Enter your name"
    />

    <!-- SKIN TYPE -->
    <select id="skin">
      <option value="Oily">Oily Skin</option>
      <option value="Dry">Dry Skin</option>
      <option value="Combination">Combination Skin</option>
      <option value="Sensitive">Sensitive Skin</option>
    </select>

    <!-- BUDGET -->
    <input
      type="number"
      id="budget"
      placeholder="Enter your budget"
    />

    <!-- ISSUE -->
    <input
      type="text"
      id="issue"
      placeholder="Skin concern (acne, dullness etc.)"
    />

    <!-- BUTTON -->
    <button onclick="getPlan()">
      Show My Plan 💖
    </button>

    <!-- RESULT -->
    <div id="result"></div>
    <a href="tracker.html">

  <button class="tracker-btn">
    ✨ Open Glow Tracker
  </button>

</a>

  </div>

  <script src="script.js"></script>

</body>
</html>
